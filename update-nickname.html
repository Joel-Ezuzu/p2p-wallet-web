<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Update Nickname</title>

<link rel="stylesheet" href="css/update-nickname.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/4d6f7c6c3e.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="app">

<header class="header">

  <i class="back"><a href="profile.html" class="back-btn"><h1  class="back-btn" ><</h1></i></a>

<h2>Update Nickname</h2>

</header>


<section class="avatar-section">

<div class="avatar">
<i class="fa-solid fa-user"></i>
</div>

</section>


<section class="form">

<label>New Nickname</label>

<div class="input-box">

<input type="text" placeholder="e.g. CryptoKing24">

<i class="fa-solid fa-pen"></i>

</div>

<p class="helper-text">
Your nickname must be unique and will be visible on the marketplace
</p>


<div class="info-card">

 <a href="help.html" class="info-link">
      <span class="info-icon">i</span>
 </a>

<p>
Choose a name that reflects your identity. You can change this once every 30 days.
</p>

</div>

</section>


<div class="actions">

<button class="save-btn">

<i class="fa-solid fa-check"></i>

Save Changes

</button>

<p class="cancel">
<a href="profile.html" class="
go-back-btn">Cancel and go back</a> 
</p>

</div>

</div>

</body>

</html>

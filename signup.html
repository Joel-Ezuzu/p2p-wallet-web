<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create your account</title>

<link rel="stylesheet" href="css/signup.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/4d6f7c6c3e.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="app">

<!-- HEADER -->

<header class="header">

<i class="back"><a href="index.html" class="back-btn"><h1  class="back-btn" ><</h1></i></a>

<h2>Create your account</h2>

</header>


<!-- SUBTEXT -->

<p class="subtitle">
Join our P2P community and start trading securely.
</p>


<!-- FORM -->

<section class="form">

<div class="input-group">

<label>Nickname</label>

<input type="text" placeholder="e.g. Satoshi">

</div>


<div class="input-group">

<label>Full Name</label>

<input type="text" placeholder="John Doe">

</div>


<div class="input-group">

<label>Email</label>

<input type="email" placeholder="name@email.com">

</div>


<div class="input-group">

<label>Phone Number</label>

<input type="text" placeholder="+1 (555) 000-0000">

</div>


<div class="input-group password">

<label>Password</label>

<div class="password-box">

<input type="password" placeholder="••••••••">

<i class="fa-regular fa-eye"></i>

</div>

</div>

</section>


<!-- SIGNUP BUTTON -->

<div class="actions">

<button class="primary-btn">
 <a href="terms-condition.html" class="sign-up-link">Sign Up</a>
</button>

</div>


<!-- LOGIN -->

<p class="login">
Already have an account?
<a href="index.html">Login</a>
</p>


<!-- SOCIAL -->

<section class="social">

<div class="divider">
<span>Or sign up with</span>
</div>

<div class="social-buttons">

<button class="social-btn">
<i class="fa-brands fa-google"></i>
Google
</button>

<button class="social-btn">
<i class="fa-brands fa-apple"></i>
Apple
</button>

</div>

</section>


<!-- TERMS -->

<p class="terms">
By signing up, you agree to our
<a href="#">Terms of Service</a>
and
<a href="#">Privacy Policy</a>.
</p>


</div>

</body>
</html>
